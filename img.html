<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    

    <link rel="stylesheet" href="./CSS/main.css">
</head>

<body>
    <a-scene 
            mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 4; missTolerance: 10" 
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            vr-mode-ui="enabled: false">


        <a-assets>
            <a-asset-item id="armored" src="./assets/armored_cat.glb"> </a-asset-item>
            <a-asset-item id="cat" src="./assets/cat.glb"> </a-asset-item>
            <a-asset-item id="explosion" src="./assets/explosion_as_solid.glb"> </a-asset-item>
            <a-asset-item id="rainbow" src="./assets/rainbow.glb"> </a-asset-item>
        </a-assets>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#armored" scale="0.01 0.01 0.01" position="0 0 0" rotation="0 0 0"> </a-gltf-model>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#cat" scale="0.1 0.1 0.1" position="0 0 0" rotation="0 0 0"> </a-gltf-model>
        </a-entity><a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#explosion" scale="0.1 0.1 0.1" position="0 0 0" rotation="0 0 0"> </a-gltf-model>
        </a-entity>
         </a-entity><a-entity mindar-image-target="targetIndex: 3">
           <a-gltf-model src="#rainbow" scale="0.5 0.5 0.5" position="1 1 1" rotation="0 90 0"> </a-gltf-model>
        </a-entity>

      



        <a-camera position="0 0 0" look-controls="enabeled: false"></a-camera>



    </a-scene>

    
</body>
</html>
